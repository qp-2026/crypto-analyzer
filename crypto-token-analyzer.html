<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Token Analyzer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.95;
        }

        .input-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }

        .input-group input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-group button {
            padding: 12px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .input-group button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .input-group button:active {
            transform: translateY(0);
        }

        .input-group button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .help-text {
            font-size: 0.9em;
            color: #666;
            margin-top: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 1.1em;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(102, 126, 234, 0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 16px;
            border-radius: 8px;
            margin: 20px 0;
            border-left: 4px solid #c33;
        }

        .results {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .token-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }

        .token-image {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            overflow: hidden;
        }

        .token-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .token-info h2 {
            font-size: 1.8em;
            margin-bottom: 5px;
            color: #333;
        }

        .token-symbol {
            color: #666;
            font-size: 1.1em;
            font-weight: 500;
        }

        .price-section {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .current-price {
            font-size: 2.5em;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
        }

        .price-changes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }

        .price-change {
            background: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .price-change-label {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 6px;
        }

        .price-change-value {
            font-size: 1.4em;
            font-weight: 600;
        }

        .positive {
            color: #10b981;
        }

        .negative {
            color: #ef4444;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .stat-label {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 1.3em;
            font-weight: 600;
            color: #333;
            word-break: break-word;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-bottom: 30px;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .current-price {
                font-size: 2em;
            }

            .input-group {
                flex-direction: column;
            }

            .input-group button {
                width: 100%;
            }

            .token-header {
                flex-direction: column;
                text-align: center;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Crypto Token Analyzer</h1>
            <p>Phân tích nhanh thông tin token từ Binance hay Hyperliquid</p>
        </div>

        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="tokenLink" 
                    placeholder="Dán link từ Binance hoặc Hyperliquid (VD: https://www.binance.com/en/trade/BTC_USDT)"
                >
                <button id="analyzeBtn" onclick="analyzeToken()">Phân Tích</button>
            </div>
            <div class="help-text">
                💡 Paste link trực tiếp từ Binance hoặc Hyperliquid, hoặc chỉ cần nhập symbol (BTC, ETH, SOL...)
            </div>
        </div>

        <div id="content"></div>
    </div>

    <script>
        let chart = null;

        function extractTokenSymbol(input) {
            // Xóa khoảng trắng
            input = input.trim().toUpperCase();
            
            // Nếu là link, extract symbol
            if (input.includes('binance.com')) {
                const match = input.match(/\/trade\/([A-Z0-9]+)_/);
                if (match) return match[1];
            }
            
            if (input.includes('hyperliquid')) {
                const match = input.match(/[?&]symbol=([A-Z0-9]+)/);
                if (match) return match[1];
            }
            
            // Nếu là symbol thôi
            const symbolMatch = input.match(/[A-Z]+/);
            if (symbolMatch) return symbolMatch[0];
            
            return null;
        }

        async function analyzeToken() {
            const input = document.getElementById('tokenLink').value;
            if (!input) {
                showError('Vui lòng nhập link hoặc symbol token');
                return;
            }

            const symbol = extractTokenSymbol(input);
            if (!symbol) {
                showError('Không thể nhận diện token. Vui lòng nhập link Binance/Hyperliquid hoặc symbol (BTC, ETH, v.v.)');
                return;
            }

            showLoading();
            
            try {
                // Gọi CoinGecko API
                const response = await fetch(
                    `https://api.coingecko.com/api/v3/search?query=${symbol}`
                );
                const searchData = await response.json();
                
                if (!searchData.coins || searchData.coins.length === 0) {
                    showError(`Không tìm thấy token "${symbol}". Vui lòng kiểm tra lại symbol.`);
                    return;
                }

                const coin = searchData.coins[0];
                const coinId = coin.id;

                // Lấy chi tiết thêm
                const detailResponse = await fetch(
                    `https://api.coingecko.com/api/v3/coins/${coinId}?localization=false&tickers=false&market_data=true&community_data=false&developer_data=false&sparkline=true`
                );
                const detailData = await detailResponse.json();

                displayResults(detailData);
            } catch (error) {
                showError('Lỗi khi lấy dữ liệu: ' + error.message);
                console.error(error);
            }
        }

        function showLoading() {
            document.getElementById('content').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Đang phân tích token...</p>
                </div>
            `;
        }

        function showError(message) {
            document.getElementById('content').innerHTML = `
                <div class="error">${message}</div>
            `;
        }

        function formatNumber(num) {
            if (!num) return 'N/A';
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
            return num.toFixed(2);
        }

        function formatPrice(price) {
            if (!price) return 'N/A';
            if (price > 1) return '$' + price.toFixed(2);
            if (price > 0.01) return '$' + price.toFixed(4);
            return '$' + price.toFixed(8);
        }

        function displayResults(data) {
            const marketData = data.market_data || {};
            const currentPrice = marketData.current_price?.usd || 0;
            const priceChange24h = marketData.price_change_percentage_24h || 0;
            const priceChange7d = marketData.price_change_percentage_7d || 0;
            const priceChange30d = marketData.price_change_percentage_30d || 0;
            const marketCap = marketData.market_cap?.usd || 0;
            const volume24h = marketData.total_volume?.usd || 0;
            const ath = marketData.ath?.usd || 0;
            const atl = marketData.atl?.usd || 0;
            const circulatingSupply = data.market_data?.circulating_supply || 0;
            const totalSupply = data.market_data?.total_supply || 0;
            const priceSparkline = marketData.sparkline_7d?.price || [];

            const html = `
                <div class="results">
                    <div class="token-header">
                        <div class="token-image">
                            ${data.image?.large ? `<img src="${data.image.large}" alt="${data.name}">` : '📊'}
                        </div>
                        <div class="token-info">
                            <h2>${data.name}</h2>
                            <span class="token-symbol">${data.symbol?.toUpperCase()}</span>
                        </div>
                    </div>

                    <div class="price-section">
                        <div class="current-price">${formatPrice(currentPrice)}</div>
                        <div class="price-changes">
                            <div class="price-change">
                                <div class="price-change-label">24h</div>
                                <div class="price-change-value ${priceChange24h >= 0 ? 'positive' : 'negative'}">
                                    ${priceChange24h >= 0 ? '+' : ''}${priceChange24h.toFixed(2)}%
                                </div>
                            </div>
                            <div class="price-change">
                                <div class="price-change-label">7d</div>
                                <div class="price-change-value ${priceChange7d >= 0 ? 'positive' : 'negative'}">
                                    ${priceChange7d >= 0 ? '+' : ''}${priceChange7d.toFixed(2)}%
                                </div>
                            </div>
                            <div class="price-change">
                                <div class="price-change-label">30d</div>
                                <div class="price-change-value ${priceChange30d >= 0 ? 'positive' : 'negative'}">
                                    ${priceChange30d >= 0 ? '+' : ''}${priceChange30d.toFixed(2)}%
                                </div>
                            </div>
                        </div>
                    </div>

                    ${priceSparkline.length > 0 ? `
                        <div class="chart-container">
                            <canvas id="priceChart"></canvas>
                        </div>
                    ` : ''}

                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-label">Market Cap</div>
                            <div class="stat-value">${formatNumber(marketCap)}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Volume 24h</div>
                            <div class="stat-value">${formatNumber(volume24h)}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">All-Time High</div>
                            <div class="stat-value">${formatPrice(ath)}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">All-Time Low</div>
                            <div class="stat-value">${formatPrice(atl)}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Circulating Supply</div>
                            <div class="stat-value">${formatNumber(circulatingSupply)} ${data.symbol?.toUpperCase()}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Total Supply</div>
                            <div class="stat-value">${formatNumber(totalSupply)} ${data.symbol?.toUpperCase()}</div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('content').innerHTML = html;

            // Vẽ chart nếu có dữ liệu
            if (priceSparkline.length > 0) {
                setTimeout(() => {
                    drawChart(priceSparkline, data.symbol?.toUpperCase());
                }, 100);
            }
        }

        function drawChart(priceData, symbol) {
            const ctx = document.getElementById('priceChart');
            if (!ctx) return;

            if (chart) {
                chart.destroy();
            }

            const labels = priceData.map((_, i) => {
                const date = new Date();
                date.setDate(date.getDate() - (priceData.length - i));
                return date.toLocaleDateString('vi-VN', { month: 'short', day: 'numeric' });
            });

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `${symbol} Price (7 days)`,
                        data: priceData,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.05)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 3,
                        pointBackgroundColor: '#667eea',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 1,
                        pointHoverRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            labels: {
                                usePointStyle: true,
                                padding: 16
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            grid: {
                                drawBorder: false
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            }
                        }
                    }
                }
            });
        }

        // Enter key để submit
        document.getElementById('tokenLink').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') analyzeToken();
        });
    </script>
</body>
</html>
